# CI pipeline for the referral reference module.
#
# Runs on every pull request and every push to main.
# All jobs must pass before a PR can be merged.
#
# Job order:
#   typecheck → test (parallel with typecheck, but both block merge)
#
# On the real platform, add an integration and E2E job after this that runs
# on merge to main (before deploy) using the staging environment.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Type safety — catches type errors before tests run
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Unit tests — the primary quality gate
  # Runs in parallel with typecheck so the total wall time is minimised.
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Upload a test results summary so failures are visible in the PR UI
      # without having to dig into raw logs.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
